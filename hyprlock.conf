general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = /home/seanyfade/Pictures/Gengar.jpg   # OLED's best friend
    color = rgba(0, 0, 0, 0)
    blur_passes = 2 # No blur needed for black
}
image {
    monitor =
    path = /home/seanyfade/Pictures/GenLogo.png # Supports png, jpg, webp
    size = 150                                     # Width and height of the image
    rounding = -1                                  # -1 means a perfect circle
    border_size = 4
    border_color = rgba(255, 255, 255, 0.6)
    rotate = 0                                     # Rotation in degrees
    reload_time = -1                               # -1 to disable reloading

    position = 0, 200                              # X, Y offset from alignment
    halign = center                                # left, center, right
    valign = center                                # top, center, bottom
}
# Time (Centered)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M %p")"
    color = rgba(152, 0, 2, 1)
    font_size = 64
    font_family = JetBrains Mono
    position = 0, 80
    halign = center
    valign = center
}

# Input Field
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true # Fades out the box when not typing
    placeholder_text = <i>You Shall Not Pass!...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}
