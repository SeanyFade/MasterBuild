# Correct syntax for Hyprland 0.53.2+
windowrule = match:class ^(ollama-bg)$, float on, size 800 600, center on
windowrule = match:class ^(ollama-bg)$, border_color rgb(ffaa00), opacity 0.95 0.85

# This puts it right in the middle at a classic 4:3 ratio
windowrule = float on, match:class ^(dosbox-x)$
windowrule = size 1920 1440, match:class ^(dosbox-x)$
windowrule = center on, match:class ^(dosbox-x)$

